# Rate limiting: 10 req/s per IP for API endpoints (shared memory zone: 10MB)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name _; # Aceita qualquer hostname (localhost, IP, domínio)
    root /usr/share/nginx/html;
    index index.html;

    # Log to stdout/stderr for Docker log aggregation
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 'unsafe-inline' is intentionally absent from style-src.
    # This is a client-side rendered (CSR) React app: React's style={} props are
    # set via the JavaScript DOM API at runtime and are NOT blocked by style-src.
    # Radix UI sets CSS custom properties via element.style.setProperty() (JS, not
    # blocked). Framer Motion v11+ uses WAAPI and does not inject <style> tags for
    # standard opacity/transform animations. All app JS/CSS is bundled by Vite.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # API proxy with rate limiting (burst=20 allows short spikes; nodelay serves immediately)
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api:39100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health/liveness endpoints — proxy to the API backend (no rate limiting needed)
    location ~ ^/(live|health|ready)/ {
        proxy_pass http://api:39100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve .mjs files with correct MIME type — required for PDF.js worker loaded
    # as a module script. Nginx's default mime.types does not include .mjs, so
    # without this block the file is served as application/octet-stream and the
    # browser rejects it with a strict MIME type error.
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
