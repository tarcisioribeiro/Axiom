# Grafana Dashboard Stack for Axiom
# ----------------------------------------
# Pre-provisioned with:
#   - Prometheus datasource pointing to prometheus:9090
#   - Axiom Django dashboard (request rate, error rate, DB queries, cache hit ratio)
#
# Apply with:
#   export GRAFANA_ADMIN_USER=admin
#   export GRAFANA_ADMIN_PASSWORD=$(openssl rand -base64 24)
#   envsubst < k8s/monitoring/grafana.yaml | kubectl apply -f -
#
# Access Grafana UI:
#   kubectl port-forward -n monitoring svc/grafana 3000:3000
---
# Grafana admin credentials — set GRAFANA_ADMIN_USER and GRAFANA_ADMIN_PASSWORD
# before applying via: envsubst < k8s/monitoring/grafana.yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
  GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: Axiom
        orgId: 1
        folder: Axiom
        folderUid: axiom
        type: file
        disableDeletion: true
        updateIntervalSeconds: 60
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
data:
  axiom-django.json: |
    {
      "title": "Axiom Django API",
      "uid": "axiom-django",
      "tags": ["axiom", "django"],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Rate (req/s)",
          "description": "HTTP requests per second by status code family",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "uid": "prometheus", "type": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(rate(django_http_responses_total_by_status_total{status=~\"2..\"}[5m]))",
              "legendFormat": "2xx",
              "refId": "A"
            },
            {
              "expr": "sum(rate(django_http_responses_total_by_status_total{status=~\"4..\"}[5m]))",
              "legendFormat": "4xx",
              "refId": "B"
            },
            {
              "expr": "sum(rate(django_http_responses_total_by_status_total{status=~\"5..\"}[5m]))",
              "legendFormat": "5xx",
              "refId": "C"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "HTTP Error Rate (%)",
          "description": "Percentage of requests returning 5xx errors. Alert fires when this exceeds 1%.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "uid": "prometheus", "type": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": { "mode": "fixed", "fixedColor": "red" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.01 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          },
          "targets": [
            {
              "expr": "sum(rate(django_http_responses_total_by_status_total{status=~\"5..\"}[5m])) / sum(rate(django_http_responses_total_by_status_total[5m]))",
              "legendFormat": "Error rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Database Query Rate (queries/s)",
          "description": "Rate of SQL queries executed against PostgreSQL",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "uid": "prometheus", "type": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(rate(django_db_execute_total[5m])) by (alias)",
              "legendFormat": "DB {{ alias }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Cache Hit Ratio (%)",
          "description": "Redis cache hit percentage — higher is better. Low values indicate cold cache or missed keys.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "uid": "prometheus", "type": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 0.8 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          },
          "targets": [
            {
              "expr": "sum(rate(django_cache_get_hits_total[5m])) / sum(rate(django_cache_get_total[5m]))",
              "legendFormat": "Cache hit ratio",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Request Latency (p50 / p95 / p99)",
          "description": "HTTP request latency percentiles in seconds",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "datasource": { "uid": "prometheus", "type": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(django_http_requests_latency_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(django_http_requests_latency_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(django_http_requests_latency_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data-pvc
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472   # grafana user
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http
