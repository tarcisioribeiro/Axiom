# Prometheus Monitoring Stack for MindLedger
# -------------------------------------------
# Apply order:
#   kubectl apply -f k8s/monitoring/prometheus.yaml
#
# Metrics exposed by the Django API at /metrics (django-prometheus)
# are auto-discovered via the prometheus.io/scrape annotations on api-service.
#
# Alert rules cover:
#   - HTTP error rate > 1% for 5 minutes
#   - Pod restart rate elevated (>0 restarts in 15m window)
#   - Disk fill rate (node_exporter required — deploy separately if needed)
#
# Access Prometheus UI:
#   kubectl port-forward -n monitoring svc/prometheus 9090:9090
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/name: monitoring
---
# RBAC — Prometheus needs read access to pods/services/endpoints across namespaces
# for Kubernetes service discovery.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
# Configuration: prometheus.yml + alert rules embedded in a single ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: mindledger
        environment: production

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []
          # TODO: add Alertmanager address when deployed
          # - targets: ['alertmanager:9093']

    rule_files:
      - /etc/prometheus/rules.yaml

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # MindLedger Django API — auto-discovered via annotation on api-service:
      #   prometheus.io/scrape: "true"
      #   prometheus.io/path:   "/metrics"
      #   prometheus.io/port:   "8002"
      - job_name: mindledger-api
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: [mindledger]
        relabel_configs:
          # Keep only endpoints whose service has prometheus.io/scrape=true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Rewrite metrics path from annotation (default /metrics)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Rewrite port from annotation
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Propagate useful labels
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # Kubernetes node cAdvisor metrics (container CPU/memory/disk)
      # Used by the "Pod restarts" and "Disk usage" alert rules below.
      - job_name: kubernetes-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

  rules.yaml: |
    groups:
      - name: mindledger.rules
        rules:

          # --- HTTP Error Rate > 1% ---
          - alert: HighHttpErrorRate
            expr: |
              sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
              /
              sum(rate(django_http_responses_total_by_status_total[5m])) > 0.01
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "HTTP 5xx error rate above 1%"
              description: >-
                The API is returning 5xx errors at
                {{ $value | humanizePercentage }} of all requests
                (threshold 1%) for the last 5 minutes.

          # --- Pod restarting frequently ---
          - alert: PodRestartingFrequently
            expr: |
              increase(
                kube_pod_container_status_restarts_total{namespace="mindledger"}[15m]
              ) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is restarting frequently"
              description: >-
                Pod {{ $labels.namespace }}/{{ $labels.pod }}
                has restarted {{ $value | humanize }} times in the last 15 minutes.
                Check logs with: kubectl logs -n {{ $labels.namespace }} {{ $labels.pod }}

          # --- Disk fill rate (node-level, requires node-exporter) ---
          # Deploy node-exporter DaemonSet separately if disk alerts are needed.
          - alert: DiskUsageHigh
            expr: |
              (
                node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
                - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
              )
              / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} > 0.80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Disk usage above 80% on {{ $labels.instance }}"
              description: >-
                Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }}
                is {{ $value | humanizePercentage }} full.
                Free space now before writes fail.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data-pvc
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: monitoring
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534  # nobody
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http
