apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: api
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: frontend
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: frontend
