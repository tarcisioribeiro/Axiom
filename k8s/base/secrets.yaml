apiVersion: v1
kind: Secret
metadata:
  name: axiom-secrets
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials
  DB_NAME: "${DB_NAME}"
  DB_USER: "${DB_USER}"
  DB_PASSWORD: "${DB_PASSWORD}"

  # Django secrets
  SECRET_KEY: "${SECRET_KEY}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY}"

  # Superuser credentials
  DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME}"
  DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL}"
  DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD}"

  # Redis credentials
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  REDIS_URL: "redis://:${REDIS_PASSWORD}@redis-service:6379/0"

  # MinIO credentials
  MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
  MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"

  # Error tracking (optional — leave empty to disable)
  SENTRY_DSN: "${SENTRY_DSN}"

---
apiVersion: v1
kind: Secret
metadata:
  name: axiom-backup-secrets
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: backup
type: Opaque
stringData:
  # AES-256 passphrase used to encrypt database dumps before upload.
  # Generate a strong value: openssl rand -base64 48
  # WARNING: never change this after encrypting data — older backups will
  # become unrecoverable without the original key.
  BACKUP_ENCRYPTION_KEY: "${BACKUP_ENCRYPTION_KEY}"

  # MinIO / S3 off-site storage
  # For the in-cluster MinIO instance use: http://minio-service:9000
  MINIO_ENDPOINT: "${MINIO_ENDPOINT}"
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
