# =============================================================================
# GitLab Container Registry (self-hosted) — imagePullSecret
# =============================================================================
#
# This secret allows k8s to pull images from the self-hosted GitLab registry.
#
# Registry: registry.tjtux.duckdns.org (resolves to 84.247.184.151)
#
# DO NOT apply this file directly — create the secret imperatively so that
# credentials never land in version control:
#
#   kubectl create secret docker-registry gitlab-registry-secret \
#     --docker-server=registry.tjtux.duckdns.org \
#     --docker-username=YOUR_GITLAB_USERNAME \
#     --docker-password=YOUR_PERSONAL_ACCESS_TOKEN \
#     --namespace axiom
#
#   kubectl create secret docker-registry gitlab-registry-secret \
#     --docker-server=registry.tjtux.duckdns.org \
#     --docker-username=YOUR_GITLAB_USERNAME \
#     --docker-password=YOUR_PERSONAL_ACCESS_TOKEN \
#     --namespace axiom-staging
#
# NOTE: The node running k8s must be able to resolve registry.tjtux.duckdns.org.
# If DNS resolution fails, add the entry to /etc/hosts on the node:
#   echo "84.247.184.151 registry.tjtux.duckdns.org" | sudo tee -a /etc/hosts
#
# Personal Access Token: GitLab → User Settings → Access Tokens
#   Required scope: read_registry
#
# Alternatively, use a Deploy Token (project-scoped):
#   GitLab → Project → Settings → Repository → Deploy tokens
#   Required scope: read_registry
#
# =============================================================================
#
# This file is intentionally left as documentation only.
# The actual secret MUST be created via kubectl, not kubectl apply -f.
#
