# NodePort services have been removed and replaced by an nginx-ingress controller.
#
# External traffic is now routed through the Ingress resource defined in
# k8s/ingress.yaml, which provides:
#   - Path-based routing  (/api → api-service, / → frontend-service)
#   - TLS termination via cert-manager + Let's Encrypt
#   - A single external entry-point (ports 80/443 on the ingress controller)
#
# The postgres-nodeport service that previously exposed PostgreSQL on
# NodePort 30102 has been permanently removed. The database is reachable
# only through its ClusterIP service (postgres-service:5432) inside the
# cluster. It must never be exposed externally.
#
# To install the nginx-ingress controller for Kind, see the instructions
# at the top of k8s/ingress.yaml.
