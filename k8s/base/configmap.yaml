apiVersion: v1
kind: ConfigMap
metadata:
  name: mindledger-config
  namespace: mindledger
  labels:
    app.kubernetes.io/name: mindledger
    app.kubernetes.io/component: config
data:
  # Database connection
  DB_HOST: "postgres-service"
  DB_PORT: "5432"

  # Redis connection
  REDIS_URL: "redis://redis-service:6379/0"

  # API settings
  API_PORT: "8002"
  DEBUG: "0"
  # Include the ingress hostname so Django accepts requests forwarded by nginx.
  # TODO: replace "mindledger.example.com" with your actual domain.
  ALLOWED_HOSTS: "localhost,127.0.0.1,api-service,mindledger-api,mindledger.example.com"
  # Include both http (local Kind dev) and https (production via ingress TLS).
  # TODO: replace "mindledger.example.com" with your actual domain.
  CORS_ALLOWED_ORIGINS: "http://localhost:39101,http://127.0.0.1:39101,http://frontend-service,https://mindledger.example.com"

  # Sentry environment tag
  SENTRY_ENVIRONMENT: "production"

  # Production security settings
  SECURE_SSL_REDIRECT: "True"
  SESSION_COOKIE_SECURE: "True"
  CSRF_COOKIE_SECURE: "True"
  SECURE_HSTS_SECONDS: "31536000"
  SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"

  # Django settings
  PYTHONUNBUFFERED: "1"
  DJANGO_SETTINGS_MODULE: "app.settings"
  LOG_FORMAT: "json"
  TZ: "America/Sao_Paulo"
