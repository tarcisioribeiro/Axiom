apiVersion: v1
kind: ConfigMap
metadata:
  name: axiom-config
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: config
data:
  # Database connection
  DB_HOST: "postgres-service"
  DB_PORT: "5432"

  # API settings
  API_PORT: "39100"
  DEBUG: "0"
  # Include the ingress hostname so Django accepts requests forwarded by nginx.
  ALLOWED_HOSTS: "localhost,127.0.0.1,api-service,axiom-api,axiom.tjtux.duckdns.org"
  # Include both http (local Kind dev) and https (production via ingress TLS).
  CORS_ALLOWED_ORIGINS: "http://localhost:39101,http://127.0.0.1:39101,http://frontend-service,https://axiom.tjtux.duckdns.org"

  # MinIO object storage
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_EXTERNAL_ENDPOINT: "minio.tjtux.duckdns.org"
  MINIO_BUCKET_NAME: "axiom"
  MINIO_USE_SSL: "true"
  # Path to the internal CA cert mounted from the minio-tls Secret (see k8s/api/deployment.yaml).
  # Used by Django's S3 storage backend to verify the self-signed MinIO TLS certificate.
  MINIO_CA_BUNDLE: "/etc/ssl/minio/ca.crt"

  # Ollama — LLM local implantado no mesmo namespace (deployment: ollama).
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  OLLAMA_MODEL: "mistral:7b-instruct"
  OLLAMA_EMBED_MODEL: "nomic-embed-text"
  LLM_PROVIDER: "ollama"

  # Sentry environment tag
  SENTRY_ENVIRONMENT: "production"

  # Production security settings
  # NPM faz SSL termination — Django não precisa redirecionar para HTTPS
  SECURE_SSL_REDIRECT: "False"
  SESSION_COOKIE_SECURE: "True"
  CSRF_COOKIE_SECURE: "True"
  SECURE_HSTS_SECONDS: "31536000"
  SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"

  # Django settings
  PYTHONUNBUFFERED: "1"
  DJANGO_SETTINGS_MODULE: "app.settings"
  LOG_FORMAT: "json"
  TZ: "America/Sao_Paulo"
