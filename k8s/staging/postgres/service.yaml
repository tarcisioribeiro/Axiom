apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: axiom-staging
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: postgres
    environment: staging
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
