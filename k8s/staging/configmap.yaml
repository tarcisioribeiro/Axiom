apiVersion: v1
kind: ConfigMap
metadata:
  name: axiom-config
  namespace: axiom-staging
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: config
    environment: staging
data:
  # Database connection (own staging instance)
  DB_HOST: "postgres-service"
  DB_PORT: "5432"

  # API settings
  API_PORT: "39100"
  DEBUG: "True"

  ALLOWED_HOSTS: "localhost,127.0.0.1,api-service,axiom-staging.tjtux.duckdns.org"
  CORS_ALLOWED_ORIGINS: "http://localhost:39101,https://axiom-staging.tjtux.duckdns.org"

  # MinIO object storage (own staging instance)
  # No MINIO_EXTERNAL_ENDPOINT — all files are served via Django proxy stream.
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_BUCKET_NAME: "axiom-staging"
  MINIO_USE_SSL: "false"

  # Ollama — implantado no namespace de staging (deployment: ollama).
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  OLLAMA_MODEL: "mistral:7b-instruct"
  OLLAMA_EMBED_MODEL: "nomic-embed-text"
  LLM_PROVIDER: "ollama"

  # Sentry environment tag
  SENTRY_ENVIRONMENT: "staging"

  # Staging: SSL redirect off (Ingress handles TLS termination)
  SECURE_SSL_REDIRECT: "False"
  SESSION_COOKIE_SECURE: "True"
  CSRF_COOKIE_SECURE: "True"
  SECURE_HSTS_SECONDS: "0"
  SECURE_HSTS_INCLUDE_SUBDOMAINS: "False"

  # Django settings
  PYTHONUNBUFFERED: "1"
  DJANGO_SETTINGS_MODULE: "app.settings"
  LOG_FORMAT: "json"
  TZ: "America/Sao_Paulo"
  # Staging: 2 workers to stay within the 512Mi memory limit.
  GUNICORN_WORKERS: "2"
