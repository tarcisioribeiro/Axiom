apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: axiom-staging
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: api
    environment: staging
spec:
  replicas: 1
  progressDeadlineSeconds: 1200
  revisionHistoryLimit: 3
  minReadySeconds: 30
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/name: axiom
        app.kubernetes.io/component: api
        environment: staging
    spec:
      serviceAccountName: sa-api
      # true necessário para montar o token e permitir restart do Ollama via admin panel.
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready!"
      containers:
        - name: api
          # Image tag is pinned to the build digest on every deploy by CI/CD.
          # See deploy:staging job in .gitlab-ci.yml.
          image: ghcr.io/owner/axiom-api:0.0.0
          ports:
            - containerPort: 39100
              name: http
          envFrom:
            - configMapRef:
                name: axiom-config
            - secretRef:
                name: axiom-secrets
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: logs
              mountPath: /app/logs
            - name: staticfiles
              mountPath: /app/staticfiles
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /live/
              port: 39100
              httpHeaders:
                - name: Host
                  value: api-service
            # Allow up to 60 × 15s = 900s (+ 30s initial) for the entrypoint to finish
            # (151 migrations + collectstatic + createsuperuser + setup_members).
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /ready/
              port: 39100
              httpHeaders:
                - name: Host
                  value: api-service
            # startupProbe guarantees gunicorn is up before this runs.
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live/
              port: 39100
              httpHeaders:
                - name: Host
                  value: api-service
            # startupProbe guarantees gunicorn is up before this runs.
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: api-media-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: api-logs-pvc
        - name: staticfiles
          persistentVolumeClaim:
            claimName: api-static-pvc
