apiVersion: v1
kind: Secret
metadata:
  name: axiom-secrets
  namespace: axiom-staging
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: secrets
    environment: staging
type: Opaque
stringData:
  # Database credentials (staging-specific — use different credentials from production)
  DB_NAME: "${STAGING_DB_NAME}"
  DB_USER: "${STAGING_DB_USER}"
  DB_PASSWORD: "${STAGING_DB_PASSWORD}"

  # Django secrets (staging-specific — NEVER reuse production keys)
  SECRET_KEY: "${STAGING_SECRET_KEY}"
  ENCRYPTION_KEY: "${STAGING_ENCRYPTION_KEY}"

  # Superuser credentials
  DJANGO_SUPERUSER_USERNAME: "${STAGING_SUPERUSER_USERNAME}"
  DJANGO_SUPERUSER_EMAIL: "${STAGING_SUPERUSER_EMAIL}"
  DJANGO_SUPERUSER_PASSWORD: "${STAGING_SUPERUSER_PASSWORD}"

  # Redis credentials (staging-specific)
  REDIS_PASSWORD: "${STAGING_REDIS_PASSWORD}"
  REDIS_URL: "redis://:${STAGING_REDIS_PASSWORD}@redis-service:6379/0"

  # MinIO credentials (staging-specific)
  MINIO_ROOT_USER: "${STAGING_MINIO_ROOT_USER}"
  MINIO_ROOT_PASSWORD: "${STAGING_MINIO_ROOT_PASSWORD}"

  # Error tracking (optional — leave empty to disable)
  SENTRY_DSN: "${STAGING_SENTRY_DSN}"
