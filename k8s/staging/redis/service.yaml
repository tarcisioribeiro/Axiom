apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: axiom-staging
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: redis
    environment: staging
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
