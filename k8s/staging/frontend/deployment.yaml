apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: axiom-staging
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: frontend
    environment: staging
spec:
  replicas: 1
  progressDeadlineSeconds: 300
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: axiom
        app.kubernetes.io/component: frontend
        environment: staging
    spec:
      serviceAccountName: sa-frontend
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          # Image tag is pinned to the build digest on every deploy by CI/CD.
          # See deploy:staging job in .gitlab-ci.yml.
          image: ghcr.io/owner/axiom-frontend:0.0.0
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "America/Sao_Paulo"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
