apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: ollama
spec:
  selector:
    app: ollama
  ports:
    - name: http
      protocol: TCP
      port: 11434
      targetPort: 11434
  type: ClusterIP
