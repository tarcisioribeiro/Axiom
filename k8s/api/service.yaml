apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: mindledger
  labels:
    app.kubernetes.io/name: mindledger
    app.kubernetes.io/component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8002"
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
      name: http
