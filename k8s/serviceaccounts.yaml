---
# Least-privilege ServiceAccounts for each Axiom workload.
# automountServiceAccountToken: false prevents pods from mounting the default
# SA token — workloads in this namespace have no need to call the Kubernetes API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-api
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: api
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-frontend
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: frontend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-postgres
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: postgres
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-redis
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: redis
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-minio
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: minio
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-backup
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: backup
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-ollama
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: ollama
automountServiceAccountToken: false
---
# Permite que o pod da API acione kubectl rollout restart no deployment ollama.
# O token é montado no pod (automountServiceAccountToken: true no deployment)
# e o acesso é restrito por RBAC ao mínimo necessário.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: role-api-restart-ollama
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["ollama", "api-blue", "api-green", "frontend"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rolebinding-api-restart-ollama
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: role-api-restart-ollama
subjects:
  - kind: ServiceAccount
    name: sa-api
    namespace: axiom
