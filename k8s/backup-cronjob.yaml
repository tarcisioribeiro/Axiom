# =============================================================================
# MindLedger — Automated Database Backup
# =============================================================================
#
# Resources defined in this file (apply order matters):
#   1. backup-pvc              PVC for local backup staging (~5 Gi)
#   2. backup-script           ConfigMap embedding api/scripts/backup.sh
#   3. mindledger-db-backup    CronJob — daily at 02:00 BRT
#
# ─────────────────────────────────────────────────────────────────────────────
# Prerequisites
# ─────────────────────────────────────────────────────────────────────────────
#
#   The Secret "mindledger-backup-secrets" must exist before applying.
#   It is defined in k8s/base/secrets.yaml and requires these variables:
#
#     BACKUP_ENCRYPTION_KEY  Random 32+ char passphrase for AES-256 encryption.
#                            NEVER change this after encrypting data — older
#                            backups will become unrecoverable.
#     MINIO_ENDPOINT         e.g. http://minio-service:9000
#     MINIO_ACCESS_KEY       MinIO / S3 access key
#     MINIO_SECRET_KEY       MinIO / S3 secret key
#
# ─────────────────────────────────────────────────────────────────────────────
# RPO / RTO Targets
# ─────────────────────────────────────────────────────────────────────────────
#
#   RPO (Recovery Point Objective): 24 hours
#     Backups run daily at 02:00 BRT. Worst-case data loss is one day.
#
#   RTO (Recovery Time Objective): ≤ 4 hours
#     • Download encrypted dump from MinIO            ~  5 min
#     • Decrypt with openssl                          ~  5 min
#     • Provision / restart Kubernetes infrastructure ~ 30 min
#     • pg_restore (size-dependent; typically)        ~ 30–120 min
#     • Smoke-tests and service cutover               ~ 15 min
#
# ─────────────────────────────────────────────────────────────────────────────
# Keeping the script in sync
# ─────────────────────────────────────────────────────────────────────────────
#
#   The canonical source is api/scripts/backup.sh.
#   After editing that file, regenerate the ConfigMap section with:
#
#     kubectl create configmap backup-script \
#       --from-file=backup.sh=api/scripts/backup.sh \
#       --dry-run=client -o yaml -n mindledger
#
#   Then replace the data.backup\.sh field below with the new output.
#
# ─────────────────────────────────────────────────────────────────────────────
# Apply
# ─────────────────────────────────────────────────────────────────────────────
#
#   kubectl apply -f k8s/backup-cronjob.yaml
#
#   Trigger a manual run:
#     kubectl create job --from=cronjob/mindledger-db-backup mindledger-backup-manual -n mindledger
#
#   Watch logs:
#     kubectl logs -f -l app=mindledger-backup -n mindledger
#
# =============================================================================

---
# ── 1. PVC — local staging volume ─────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: mindledger
  labels:
    app.kubernetes.io/name: mindledger
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# ── 2. ConfigMap — backup script ──────────────────────────────────────────────
# Source of truth: api/scripts/backup.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-script
  namespace: mindledger
  labels:
    app.kubernetes.io/name: mindledger
    app.kubernetes.io/component: backup
data:
  backup.sh: |
    #!/bin/bash
    # =============================================================================
    # MindLedger Database Backup Script
    # =============================================================================
    #
    # Designed to run inside a Kubernetes CronJob pod (see k8s/backup-cronjob.yaml).
    # Connects to PostgreSQL via the cluster-internal service (PGHOST) — no
    # docker exec required.
    #
    # ─────────────────────────────────────────────────────────────────────────────
    # RPO / RTO Targets
    # ─────────────────────────────────────────────────────────────────────────────
    #
    #   RPO (Recovery Point Objective): 24 hours
    #     Backups run daily at 02:00 BRT via Kubernetes CronJob.
    #     In the worst case, up to 24 h of changes may be lost after a failure.
    #
    #   RTO (Recovery Time Objective): ≤ 4 hours
    #     Breakdown:
    #       • Download encrypted backup from MinIO          ~  5 min
    #       • Decrypt with openssl                          ~  5 min
    #       • Provision / restart Kubernetes infrastructure ~ 30 min
    #       • pg_restore (depends on DB size; typically)   ~ 30–120 min
    #       • Smoke-tests and service cutover               ~ 15 min
    #
    # ─────────────────────────────────────────────────────────────────────────────
    # Restore Procedure
    # ─────────────────────────────────────────────────────────────────────────────
    #
    #   1. Download the encrypted dump from MinIO:
    #        mc cp mindledger-minio/mindledger-backups/db/db_backup_<TS>.dump.enc .
    #
    #   2. Decrypt (key must match BACKUP_ENCRYPTION_KEY used during backup):
    #        export BACKUP_ENCRYPTION_KEY="<key>"
    #        openssl enc -d -aes-256-cbc -pbkdf2 -iter 600000 \
    #          -pass env:BACKUP_ENCRYPTION_KEY \
    #          -in  db_backup_<TS>.dump.enc \
    #          -out db_backup_<TS>.dump
    #
    #   3. Restore:
    #        pg_restore \
    #          -h <PGHOST> -p <PGPORT> -U <DB_USER> -d <DB_NAME> \
    #          --clean --if-exists --no-owner --no-privileges \
    #          --verbose \
    #          db_backup_<TS>.dump
    #
    # =============================================================================

    set -euo pipefail

    # ── Configuration ─────────────────────────────────────────────────────────────
    BACKUP_DIR="${BACKUP_DIR:-/backups}"
    DATE=$(date +%Y%m%d_%H%M%S)
    DB_NAME="${DB_NAME:-mindledger_db}"
    DB_USER="${DB_USER:-postgres}"
    PGHOST="${PGHOST:-postgres-service}"
    PGPORT="${PGPORT:-5432}"
    RETENTION_DAYS="${RETENTION_DAYS:-30}"
    MINIO_BUCKET="${MINIO_BUCKET:-mindledger-backups}"
    MC_BIN="${MC_BIN:-/tools/mc}"

    export PGHOST PGPORT PGPASSWORD

    # ── Fail-fast on missing required variables ────────────────────────────────────
    : "${PGPASSWORD:?PGPASSWORD is required}"
    : "${BACKUP_ENCRYPTION_KEY:?BACKUP_ENCRYPTION_KEY is required}"
    : "${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}"
    : "${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}"
    : "${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}"

    # ── Logging ───────────────────────────────────────────────────────────────────
    GREEN='\033[0;32m'
    RED='\033[0;31m'
    YELLOW='\033[1;33m'
    NC='\033[0m'

    log()     { echo -e "${GREEN}[$(date '+%Y-%m-%d %H:%M:%S')]${NC} $*"; }
    error()   { echo -e "${RED}[$(date '+%Y-%m-%d %H:%M:%S')] ERROR:${NC} $*" >&2; }
    warning() { echo -e "${YELLOW}[$(date '+%Y-%m-%d %H:%M:%S')] WARNING:${NC} $*"; }

    # ── File paths ────────────────────────────────────────────────────────────────
    mkdir -p "$BACKUP_DIR"

    DB_DUMP="$BACKUP_DIR/db_backup_${DATE}.dump"
    DB_ENC="$BACKUP_DIR/db_backup_${DATE}.dump.enc"
    DB_MANIFEST="$BACKUP_DIR/db_backup_${DATE}.manifest"

    log "════════════════════════════════════════════════════════════"
    log "MindLedger Backup — $(date '+%Y-%m-%d %H:%M:%S %Z')"
    log "  Database : ${DB_NAME}@${PGHOST}:${PGPORT}"
    log "  Bucket   : ${MINIO_ENDPOINT}/${MINIO_BUCKET}/db/"
    log "════════════════════════════════════════════════════════════"

    # ─────────────────────────────────────────────────────────────────────────────
    # Step 1: Database dump — PostgreSQL custom format (-Fc)
    # ─────────────────────────────────────────────────────────────────────────────
    log "Step 1/4 — Creating database dump (custom format, compression=9)..."

    pg_dump \
        --host="$PGHOST" \
        --port="$PGPORT" \
        --username="$DB_USER" \
        --dbname="$DB_NAME" \
        --format=custom \
        --compress=9 \
        --no-password \
        --file="$DB_DUMP"

    DUMP_SIZE=$(du -h "$DB_DUMP" | cut -f1)
    log "Dump created: $(basename "$DB_DUMP") (${DUMP_SIZE})"

    # ─────────────────────────────────────────────────────────────────────────────
    # Step 2: Integrity verification — pg_restore --list
    # ─────────────────────────────────────────────────────────────────────────────
    log "Step 2/4 — Verifying backup integrity (pg_restore --list)..."

    if pg_restore --list "$DB_DUMP" > "$DB_MANIFEST" 2>&1; then
        OBJECT_COUNT=$(grep -c '^[0-9]' "$DB_MANIFEST" || echo "0")
        log "Integrity check passed — ${OBJECT_COUNT} objects catalogued"
    else
        error "pg_restore --list failed — archive may be corrupt"
        error "Manifest output:"
        cat "$DB_MANIFEST" >&2
        rm -f "$DB_DUMP" "$DB_MANIFEST"
        exit 1
    fi

    # ─────────────────────────────────────────────────────────────────────────────
    # Step 3: AES-256-CBC encryption
    # • PBKDF2 key derivation with 600 000 iterations
    # • Key read via -pass env:VAR — not visible in ps/cmdline
    # ─────────────────────────────────────────────────────────────────────────────
    log "Step 3/4 — Encrypting backup (AES-256-CBC, PBKDF2, 600k iterations)..."

    openssl enc -aes-256-cbc \
        -pbkdf2 \
        -iter 600000 \
        -salt \
        -pass "env:BACKUP_ENCRYPTION_KEY" \
        -in  "$DB_DUMP" \
        -out "$DB_ENC"

    ENC_SIZE=$(du -h "$DB_ENC" | cut -f1)
    log "Encrypted: $(basename "$DB_ENC") (${ENC_SIZE})"

    rm -f "$DB_DUMP"
    log "Unencrypted dump removed"

    # ─────────────────────────────────────────────────────────────────────────────
    # Step 4: Upload to MinIO — mandatory
    # ─────────────────────────────────────────────────────────────────────────────
    log "Step 4/4 — Uploading to MinIO (${MINIO_ENDPOINT})..."

    "$MC_BIN" alias set mindledger-minio \
        "$MINIO_ENDPOINT" \
        "$MINIO_ACCESS_KEY" \
        "$MINIO_SECRET_KEY" \
        --api S3v4 \
        > /dev/null 2>&1

    "$MC_BIN" mb --ignore-existing "mindledger-minio/${MINIO_BUCKET}" > /dev/null 2>&1 || true

    if ! "$MC_BIN" cp "$DB_ENC" "mindledger-minio/${MINIO_BUCKET}/db/"; then
        error "Failed to upload encrypted dump to MinIO — backup not stored off-site"
        exit 1
    fi
    log "Encrypted dump uploaded"

    if "$MC_BIN" cp "$DB_MANIFEST" "mindledger-minio/${MINIO_BUCKET}/db/" > /dev/null 2>&1; then
        log "Manifest uploaded"
    else
        warning "Manifest upload failed (non-critical)"
    fi

    # ─────────────────────────────────────────────────────────────────────────────
    # Optional: Media files backup
    # Only runs when /app/media is mounted and non-empty.
    # ─────────────────────────────────────────────────────────────────────────────
    MEDIA_ARCHIVE="$BACKUP_DIR/media_backup_${DATE}.tar.gz"

    if [ -d "/app/media" ] && [ "$(ls -A /app/media 2>/dev/null)" ]; then
        log "Media backup — archiving /app/media..."
        if tar -czf "$MEDIA_ARCHIVE" -C /app media/ 2>/dev/null; then
            MEDIA_SIZE=$(du -h "$MEDIA_ARCHIVE" | cut -f1)
            log "Media archive created: $(basename "$MEDIA_ARCHIVE") (${MEDIA_SIZE})"
            if "$MC_BIN" cp "$MEDIA_ARCHIVE" "mindledger-minio/${MINIO_BUCKET}/media/" > /dev/null 2>&1; then
                log "Media archive uploaded to MinIO"
            else
                warning "Media archive upload failed (non-critical)"
            fi
        else
            warning "Failed to create media archive (non-critical)"
        fi
    else
        log "No media files found — skipping media backup"
    fi

    # ─────────────────────────────────────────────────────────────────────────────
    # Local retention cleanup
    # ─────────────────────────────────────────────────────────────────────────────
    log "Cleaning up local backups older than ${RETENTION_DAYS} days..."
    find "$BACKUP_DIR" -name "db_backup_*.dump.enc"  -mtime "+${RETENTION_DAYS}" -delete 2>/dev/null || true
    find "$BACKUP_DIR" -name "db_backup_*.manifest"  -mtime "+${RETENTION_DAYS}" -delete 2>/dev/null || true
    find "$BACKUP_DIR" -name "media_backup_*.tar.gz" -mtime "+${RETENTION_DAYS}" -delete 2>/dev/null || true

    # ─────────────────────────────────────────────────────────────────────────────
    # Summary
    # ─────────────────────────────────────────────────────────────────────────────
    TOTAL_LOCAL=$(du -sh "$BACKUP_DIR" 2>/dev/null | cut -f1 || echo "N/A")
    log "════════════════════════════════════════════════════════════"
    log "Backup completed successfully at $(date '+%Y-%m-%d %H:%M:%S %Z')"
    log "  Encrypted dump : $(basename "$DB_ENC")"
    log "  Manifest       : $(basename "$DB_MANIFEST")"
    log "  Remote path    : ${MINIO_ENDPOINT}/${MINIO_BUCKET}/db/"
    log "  Local dir size : ${TOTAL_LOCAL}"
    log "  Timestamp      : ${DATE}"
    log "════════════════════════════════════════════════════════════"

---
# ── 3. CronJob — daily at 02:00 BRT ───────────────────────────────────────────
#
# initContainer  minio/mc:latest  copies the mc binary into the shared
#                                 emptyDir volume /tools so the main
#                                 container (postgres:16) can use it.
#
# main container postgres:16      has pg_dump, pg_restore and openssl
#                                 built in; runs the backup script.
#
# Note on api-media-pvc: it is ReadWriteOnce. To enable media backup,
# the backup pod must be scheduled on the same node as the API pod,
# or the PVC must be migrated to ReadWriteMany. The script skips the
# media step gracefully when /app/media is absent.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mindledger-db-backup
  namespace: mindledger
  labels:
    app.kubernetes.io/name: mindledger
    app.kubernetes.io/component: backup
spec:
  # 02:00 BRT daily (BRT = UTC-3, requires Kubernetes ≥ 1.27 for timeZone)
  schedule: "0 2 * * *"
  timeZone: "America/Sao_Paulo"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Fail the job if it runs longer than 1 hour
      activeDeadlineSeconds: 3600
      # Retry once before marking the job as failed
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: mindledger-backup
            app.kubernetes.io/name: mindledger
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure

          # ── initContainer: supply the mc binary ─────────────────────────────
          initContainers:
            - name: install-mc
              # Pin to a specific release tag in production, e.g.:
              # minio/mc:RELEASE.2024-11-21T17-21-54Z
              image: minio/mc:latest
              command: ["cp", "/usr/bin/mc", "/tools/mc"]
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "50m"
                limits:
                  memory: "64Mi"
                  cpu: "100m"
              volumeMounts:
                - name: tools
                  mountPath: /tools

          # ── main container: run the backup script ───────────────────────────
          containers:
            - name: backup
              image: postgres:16
              command: ["/bin/bash", "/scripts/backup.sh"]
              env:
                # PostgreSQL connection
                - name: PGHOST
                  value: "postgres-service"
                - name: PGPORT
                  value: "5432"
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: mindledger-secrets
                      key: DB_NAME
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: mindledger-secrets
                      key: DB_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mindledger-secrets
                      key: DB_PASSWORD

                # Backup encryption & off-site storage
                - name: BACKUP_ENCRYPTION_KEY
                  valueFrom:
                    secretKeyRef:
                      name: mindledger-backup-secrets
                      key: BACKUP_ENCRYPTION_KEY
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: mindledger-backup-secrets
                      key: MINIO_ENDPOINT
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: mindledger-backup-secrets
                      key: MINIO_ACCESS_KEY
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: mindledger-backup-secrets
                      key: MINIO_SECRET_KEY

                # Tunable parameters
                - name: MINIO_BUCKET
                  value: "mindledger-backups"
                - name: BACKUP_DIR
                  value: "/backups"
                - name: RETENTION_DAYS
                  value: "30"
                - name: MC_BIN
                  value: "/tools/mc"
                - name: TZ
                  value: "America/Sao_Paulo"

              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                - name: backup-script
                  mountPath: /scripts
                - name: tools
                  mountPath: /tools

              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"

          # ── volumes ─────────────────────────────────────────────────────────
          volumes:
            # PVC for staging encrypted dumps before upload
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc

            # ConfigMap holds the backup.sh script (executable via defaultMode)
            - name: backup-script
              configMap:
                name: backup-script
                defaultMode: 0755

            # Shared volume for mc binary copied by the initContainer
            - name: tools
              emptyDir: {}
