[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = [".venv", "migrations", ".git"]
known_django = ["django", "rest_framework"]
known_first_party = [
    "app",
    "authentication",
    "accounts",
    "credit_cards",
    "expenses",
    "revenues",
    "loans",
    "members",
    "transfers",
    "dashboard",
    "security",
    "library",
    "personal_planning",
    "payables",
    "vaults",
    "ai_assistant",
]
sections = ["FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "app.settings"
python_files = ["test_*.py", "*_test.py"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["."]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__pycache__/*",
    "manage.py",
    "*/wsgi.py",
    "*/asgi.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]

[tool.mypy]
python_version = "3.11"
plugins = ["mypy_django_plugin.main"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
no_implicit_optional = true
exclude = ["migrations", "tests", "scripts"]

[tool.django-stubs]
django_settings_module = "app.settings"

[[tool.mypy.overrides]]
module = [
    "django_filters.*",
    "corsheaders.*",
    "drf_spectacular.*",
    "pythonjsonlogger.*",
    "django_prometheus.*",
    "django_redis.*",
    "storages.*",
    "dateparser.*",
    "boto3.*",
    "botocore.*",
    "rest_framework_simplejwt.*",
    "requests",
    "requests.*",
    "psycopg2",
    "psycopg2.*",
    "mysql",
    "mysql.*",
]
ignore_missing_imports = true

# Existing codebase: relax strict annotation requirements.
# Add type annotations incrementally going forward.
[[tool.mypy.overrides]]
module = [
    "accounts",
    "accounts.*",
    "ai_assistant",
    "ai_assistant.*",
    "app",
    "app.*",
    "authentication",
    "authentication.*",
    "credit_cards",
    "credit_cards.*",
    "dashboard",
    "dashboard.*",
    "expenses",
    "expenses.*",
    "library",
    "library.*",
    "loans",
    "loans.*",
    "manage",
    "members",
    "members.*",
    "notifications",
    "notifications.*",
    "payables",
    "payables.*",
    "personal_planning",
    "personal_planning.*",
    "revenues",
    "revenues.*",
    "scripts",
    "scripts.*",
    "security",
    "security.*",
    "transfers",
    "transfers.*",
    "vaults",
    "vaults.*",
]
disallow_untyped_defs = false
warn_return_any = false

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    ".venv",
    "build",
    "dist",
]
per-file-ignores = [
    "__init__.py:F401",
]
